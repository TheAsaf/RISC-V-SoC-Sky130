# =============================================================================
# pin_order.cfg — I/O pin placement for soc_top
# Project: rv32_soc — Sky130 OpenLane
#
# Pin grouping rationale:
#
#   NORTH — Power/control domain
#     clk, rst_n: dedicated to the north edge, away from data signals.
#     Keeping clock pins on a single edge simplifies clock tree routing
#     and separates the high-fanout clock net from data bus routing.
#     irq_out: adjacent to clock/reset for logical grouping; useful as a
#     debug/trigger output accessible near the control edge.
#
#   SOUTH — Serial I/O domain
#     uart_rx, uart_tx: placed on the south edge for direct connection to
#     a serial connector or level-shifter without crossing other signal
#     regions. The physical separation from the clock edge also reduces
#     noise coupling from the fast serial lines onto clk/rst_n.
#
#   EAST / WEST — Not used for soc_top.
#     The soc_top interface has only 5 pins (clk, rst_n, uart_rx, uart_tx,
#     irq_out). Unlike uart_top which had a wide bus (addr/data/wen/ren),
#     the SoC top presents a minimal IO surface — this is correct for a
#     real chip where the bus is internal.
#     East and West edges are intentionally left empty; OpenLane will place
#     power/ground pads there as needed by the PDN.
#
# Format: each section header (#N, #S, #E, #W) defines pins for that edge.
# Pins are placed in the listed order from left-to-right (N/S) or
# bottom-to-top (E/W) along the die edge.
# =============================================================================

#N
clk
rst_n
irq_out

#S
uart_rx
uart_tx

#E

#W
